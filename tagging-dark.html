  <style data-purpose="custom-colors">
    :root {
      --bg-dark: #121212;
      --bg-sidebar: #1a1a1a;
      --bg-card: #222222;
      --accent-gold: #B69A43;
      --text-muted: #a0a0a0;
      --border-color: #333333;
    }
    body {
      background-color: var(--bg-dark);
      color: #ffffff;
      font-family: 'Inter', sans-serif;
    }
  </style>
  <style data-purpose="layout-adjustments">
    .tag-icon-btn {
      padding: 0.5rem;
      border: 1px solid var(--border-color);
      border-radius: 0.375rem;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 1.75rem;
      height: 1.75rem;
      color: var(--text-muted);
    }
    .tag-icon-btn:hover {
      border-color: var(--accent-gold);
      color: #fff;
    }
    .tag-icon-btn.active {
      border-color: var(--accent-gold);
      color: var(--accent-gold);
    }


        /* --- Sweeping Idle Shimmer Animations --- */
    @keyframes wave {
        0% { box-shadow: 0 0 0 0 rgba(251, 188, 4, 0); }
        30% { box-shadow: 0 0 4px 1px rgba(251, 188, 4, 0.3); border-color: rgba(251, 188, 4, 0.5); }
        100% { box-shadow: 0 0 0 0 rgba(251, 188, 4, 0); }
    }

    /* Classes applied dynamically by JavaScript */
    .play-shimmer.nav-btn {
        animation: wave 2s var(--shimmer-delay) ease-in-out forwards;
    }

    .play-shimmer.tag-icon-btn {
        animation: wave 2s var(--shimmer-delay) ease-in-out forwards;
    }
  </style>
</head>

  <script>
    lucide.createIcons();

        // --- Idle Wave Logic ---
    let idleTimeout;
    let waveInterval;
    
    const IDLE_TIME = 15000;           // 15 seconds of no movement before becoming idle
    const WAVE_INTERVAL_TIME = 6000;  // Send a wave every 6 seconds while idle
    const WAVE_SPEED = 1500;          // How long the wave takes to cross the screen (in ms)

    function triggerWave() {
        const elements = document.querySelectorAll('.nav-btn, .tag-icon-btn');
        const screenWidth = window.innerWidth;

        elements.forEach(el => {
            // Find exactly where the element is horizontally
            const rect = el.getBoundingClientRect();
            
            // Calculate delay: elements further right get a longer delay
            const delay = (rect.left / screenWidth) * WAVE_SPEED;
            
            // Inject the dynamic delay into the element's CSS
            el.style.setProperty('--shimmer-delay', `${delay}ms`);
            
            // Reset the animation class so it plays from the beginning
            el.classList.remove('play-shimmer');
            void el.offsetWidth; // Force browser reflow to restart animation
            el.classList.add('play-shimmer');
        });
    }

    function becomeIdle() {
        // Trigger the first wave immediately upon becoming idle
        triggerWave();
        // Set an interval to repeat the wave every 4 seconds
        waveInterval = setInterval(triggerWave, WAVE_INTERVAL_TIME);
    }

    function resetIdleTimer() {
        // Stop any active waves and clear timers
        clearInterval(waveInterval);
        clearTimeout(idleTimeout);
        
        // Strip the animation class immediately if the user moves
        document.querySelectorAll('.play-shimmer').forEach(el => {
            el.classList.remove('play-shimmer');
        });

        // Start the 4-second countdown to becoming idle again
        idleTimeout = setTimeout(becomeIdle, IDLE_TIME);
    }

    // Listen for interactions to reset the timer
    document.addEventListener('mousemove', resetIdleTimer);
    document.addEventListener('mousedown', resetIdleTimer);
    document.addEventListener('keydown', resetIdleTimer);

    // Initialize on page load
    resetIdleTimer();
  </script>
