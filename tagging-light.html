<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Project Settings - Manage Tags</title>
  
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  
  <script src="https://unpkg.com/lucide@latest"></script>

  <style data-purpose="custom-colors">
    :root {
      --bg-dark: #FFFFFF;
      --bg-sidebar: #FFFFFF;
      --bg-card: #FFFFFF;
      --accent-gold: #3b82f6;
      --text-muted: #282828;
      --border-color: #cfcfcf;
    }
    body {
      background-color: var(--bg-dark);
      color: #000000;
      font-family: 'Inter', sans-serif;
    }
  </style>
  <style data-purpose="layout-adjustments">
    .tag-icon-btn {
      padding: 0.5rem;
      border: 1px solid var(--border-color);
      border-radius: 0.375rem;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 1.75rem;
      height: 1.75rem;
      color: var(--text-muted);
    }
    .tag-icon-btn:hover {
      border-color: var(--accent-gold);
      color: #000000;
    }
    .tag-icon-btn.active {
      border-color: var(--accent-gold);
      color: var(--accent-gold);
    }
  </style>
</head>
<body class="md:min-h-[190px] lg:min-h-[270px] xl:min-h-[400px] flex overflow-hidden">
  
  <main class="flex-1 overflow-y-auto bg-[#FFFFFF] p-8" data-purpose="main-content">
    <div class="max-w-2xl mx-auto">
      <header class="mb-1">
        <h2 class="text-12 font-bold">Manage Tags</h2>
        <div class="border-b border-[#cfcfcf] w-full mt-1"></div>
      </header>

      <section class="p-6 rounded-lg " data-purpose="new-tag-form">
        <div class="flex items-center gap-4 mb-4 max-w-md">
          <div class="min-w-[30px] min-h-[30px] rounded bg-[#3b82f6] cursor-pointer shadow-inner"></div>
          <input class="flex-1 max-w-[150px] h-[30px] bg-transparent border border-[#cfcfcf] focus:border-[#3b82f6] focus:ring-0 rounded-md px-4 text-sm" placeholder="New tag..." type="text"/>
          <button class="h-[30px] px-4 bg-[#3b82f6] text-[12px] text-white font-semibold rounded-md hover:bg-[#3370d4] transition-colors">Add</button>
        </div>
        
        <div class="flex flex-wrap gap-2">
            <button class="tag-icon-btn active"><i data-lucide="user" class="w-4 h-4"></i></button>
            <button class="tag-icon-btn"><i data-lucide="zap" class="w-4 h-4"></i></button>
            <button class="tag-icon-btn"><i data-lucide="map-pin" class="w-4 h-4"></i></button>
            <button class="tag-icon-btn"><i data-lucide="box" class="w-4 h-4"></i></button>
            <button class="tag-icon-btn"><i data-lucide="star" class="w-4 h-4"></i></button>
            <button class="tag-icon-btn"><i data-lucide="book" class="w-4 h-4"></i></button>
            <button class="tag-icon-btn"><i data-lucide="network" class="w-4 h-4"></i></button>
            <button class="tag-icon-btn"><i data-lucide="lightbulb" class="w-4 h-4"></i></button>
        </div>
      </section>
      <section class="space-y-4 p-6" data-purpose="tags-list">
        
        <div class="p-4 gap-4 max-w-md rounded-lg border border-[#cfcfcf] hover:border-[#b8b8b8] transition-colors">
          <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-4">
              <div class="w-8 h-8 rounded bg-[#16a34a] flex items-center justify-center">
                <i data-lucide="book" class="text-white w-4 h-4"></i>
              </div>
              <span class="font-medium text-gray-500">Book/Manuscript</span>
            </div>
            <div class="flex items-center gap-4 text-gray-500">
              <i data-lucide="chevrons-down" class="w-4 h-4 cursor-pointer hover:text-black"></i>
              <i data-lucide="trash-2" class="w-4 h-4 cursor-pointer hover:text-red-500"></i>
            </div>
          </div>
          <div class="flex flex-wrap gap-2 ml-2">
            <button class="tag-icon-btn"><i data-lucide="user" class="w-4 h-4"></i></button>
            <button class="tag-icon-btn"><i data-lucide="zap" class="w-4 h-4"></i></button>
            <button class="tag-icon-btn"><i data-lucide="map-pin" class="w-4 h-4"></i></button>
            <button class="tag-icon-btn"><i data-lucide="box" class="w-4 h-4"></i></button>
            <button class="tag-icon-btn"><i data-lucide="star" class="w-4 h-4"></i></button>
            <button class="tag-icon-btn active"><i data-lucide="book" class="w-4 h-4"></i></button>
            <button class="tag-icon-btn"><i data-lucide="network" class="w-4 h-4"></i></button>
            <button class="tag-icon-btn"><i data-lucide="lightbulb" class="w-4 h-4"></i></button>
          </div>
        </div>

        <div class="p-4 gap-4 max-w-md rounded-lg border border-[#cfcfcf] hover:border-[#b8b8b8] transition-colors">
          <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-4">
              <div class="w-8 h-8 rounded bg-[#ef4444] flex items-center justify-center">
                <i data-lucide="skull" class="text-white w-4 h-4"></i>
              </div>
              <span class="font-medium text-gray-500">Antagonist</span>
            </div>
            <div class="flex items-center gap-4 text-gray-500">
              <i data-lucide="chevrons-down" class="w-4 h-4 cursor-pointer hover:text-black"></i>
              <i data-lucide="trash-2" class="w-4 h-4 cursor-pointer hover:text-red-500"></i>
            </div>
          </div>
          <div class="flex flex-wrap gap-2 ml-2">
            <button class="tag-icon-btn"><i data-lucide="user" class="w-4 h-4"></i></button>
            <button class="tag-icon-btn"><i data-lucide="zap" class="w-4 h-4"></i></button>
            <button class="tag-icon-btn"><i data-lucide="map-pin" class="w-4 h-4"></i></button>
            <button class="tag-icon-btn"><i data-lucide="box" class="w-4 h-4"></i></button>
            <button class="tag-icon-btn"><i data-lucide="star" class="w-4 h-4"></i></button>
            <button class="tag-icon-btn"><i data-lucide="book" class="w-4 h-4"></i></button>
            <button class="tag-icon-btn"><i data-lucide="network" class="w-4 h-4"></i></button>
            <button class="tag-icon-btn active"><i data-lucide="skull" class="w-4 h-4"></i></button>
          </div>
        </div>

        <div class="p-4 rounded-lg border border-[#cfcfcf] hover:border-[#b8b8b8] transition-colors">
          <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-4">
              <div class="w-8 h-8 rounded bg-[#3b82f6] flex items-center justify-center">
                <i data-lucide="user" class="text-white w-4 h-4"></i>
              </div>
              <span class="font-medium text-gray-500">Protagonist</span>
            </div>
            <div class="flex items-center gap-4 text-gray-500">
              <i data-lucide="chevrons-down" class="w-4 h-4 cursor-pointer hover:text-black"></i>
              <i data-lucide="trash-2" class="w-4 h-4 cursor-pointer hover:text-red-500"></i>
            </div>
          </div>
          <div class="flex flex-wrap gap-2 ml-2">
            <button class="tag-icon-btn active"><i data-lucide="user" class="w-4 h-4"></i></button>
            <button class="tag-icon-btn"><i data-lucide="zap" class="w-4 h-4"></i></button>
            <button class="tag-icon-btn"><i data-lucide="map-pin" class="w-4 h-4"></i></button>
            <button class="tag-icon-btn"><i data-lucide="box" class="w-4 h-4"></i></button>
            <button class="tag-icon-btn"><i data-lucide="star" class="w-4 h-4"></i></button>
            <button class="tag-icon-btn"><i data-lucide="book" class="w-4 h-4"></i></button>
            <button class="tag-icon-btn"><i data-lucide="network" class="w-4 h-4"></i></button>
            <button class="tag-icon-btn"><i data-lucide="lightbulb" class="w-4 h-4"></i></button>
          </div>
        </div>

        <div class="p-4 rounded-lg border border-[#cfcfcf] hover:border-[#b8b8b8] transition-colors">
          <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-4">
              <div class="w-8 h-8 rounded bg-cyan-400 flex items-center justify-center">
                <i data-lucide="zap" class="text-white w-4 h-4"></i>
              </div>
              <span class="font-medium text-gray-500">Powers/Abilities</span>
            </div>
            <div class="flex items-center gap-4 text-gray-500">
              <i data-lucide="chevron-down" class="w-4 h-4 cursor-pointer hover:text-black"></i>
              <i data-lucide="trash-2" class="w-4 h-4 cursor-pointer hover:text-red-500"></i>
            </div>
          </div>
          <div class="flex flex-wrap gap-2 ml-12">
            <button class="tag-icon-btn"><i data-lucide="user" class="w-4 h-4"></i></button>
            <button class="tag-icon-btn active"><i data-lucide="zap" class="w-4 h-4"></i></button>
            <button class="tag-icon-btn"><i data-lucide="map-pin" class="w-4 h-4"></i></button>
            <button class="tag-icon-btn"><i data-lucide="box" class="w-4 h-4"></i></button>
            <button class="tag-icon-btn"><i data-lucide="star" class="w-4 h-4"></i></button>
            <button class="tag-icon-btn"><i data-lucide="book" class="w-4 h-4"></i></button>
            <button class="tag-icon-btn"><i data-lucide="network" class="w-4 h-4"></i></button>
            <button class="tag-icon-btn"><i data-lucide="lightbulb" class="w-4 h-4"></i></button>
          </div>
        </div>

      </section>
      </div>
  </main>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
