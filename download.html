        <script>
            // --- OS Detection Logic ---
            const isWindows =
                navigator.platform.indexOf("Win") > -1 ||
                navigator.userAgent.indexOf("Windows") > -1;
            const isMac =
                navigator.platform.indexOf("Mac") > -1 ||
                navigator.userAgent.indexOf("Mac OS") > -1;

            const winDownloadUrl =
                "https://github.com/Novelative/Win-User-Releases/releases/latest/download/Novelative-Setup.exe";
            const macDownloadUrl =
                "https://github.com/Novelative/Mac-User-Releases/releases/latest/download/Novelative-Setup.dmg"; // Update filename if different

            document.addEventListener("DOMContentLoaded", () => {
                const btnText = document.getElementById("main-download-text");
                const mainBtn = document.getElementById("main-download-btn");

                if (isMac) {
                    btnText.textContent = "DOWNLOAD FOR MACOS";
                } else {
                    // Default to windows for everyone else
                    btnText.textContent = "DOWNLOAD FOR WINDOWS";
                }
            });

            function handleMainDownload(event) {
                event.preventDefault(); // Prevent default link behavior

                // Determine target URL based on detection
                const downloadUrl = isMac ? macDownloadUrl : winDownloadUrl;

                // Trigger the download
                window.location.href = downloadUrl;
            }

            // --- Graph Background Animation ---
            const canvas = document.getElementById("graphCanvas");
            const ctx = canvas.getContext("2d");
            let width, height;
            let particles = [];

            function getAccentColor() {
                const style = getComputedStyle(document.documentElement)
                    .getPropertyValue("--color-app-highlight")
                    .trim();
                return style
                    ? `rgba(${style.split(" ").join(",")}, 1)`
                    : "rgba(251, 191, 36, 1)";
            }

            let accentColor = getAccentColor();

            window.addEventListener("themeChanged", () => {
                accentColor = getAccentColor();
            });

            class Particle {
                constructor() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.vx = (Math.random() - 0.5) * 0.3;
                    this.vy = (Math.random() - 0.5) * 0.3;
                    this.size = Math.random() * 1.5 + 1;
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    if (this.x < 0 || this.x > width) this.vx *= -1;
                    if (this.y < 0 || this.y > height) this.vy *= -1;
                }
                draw() {
                    ctx.fillStyle = accentColor;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            function resize() {
                width = window.innerWidth;
                height = window.innerHeight;
                if (document.body.scrollHeight > window.innerHeight) {
                    height = document.body.scrollHeight;
                }

                canvas.width = width;
                canvas.height = height;
                initParticles();
            }
            window.addEventListener("resize", resize);

            function initParticles() {
                particles = [];
                const particleCount = Math.floor(width / 25);
                for (let i = 0; i < particleCount; i++) {
                    particles.push(new Particle());
                }
            }

            function animate() {
                ctx.clearRect(0, 0, width, height);
                for (let i = 0; i < particles.length; i++) {
                    particles[i].update();
                    particles[i].draw();
                    for (let j = i; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        if (distance < 100) {
                            ctx.beginPath();
                            const rgb = accentColor
                                .replace("rgba(", "")
                                .replace(")", "")
                                .split(",")
                                .slice(0, 3)
                                .join(",");
                            ctx.strokeStyle = `rgba(${rgb}, ${0.1 - distance / 1000})`;
                            ctx.lineWidth = 1;
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.stroke();
                        }
                    }
                }
                requestAnimationFrame(animate);
            }

            // --- Scroll Reveal ---
            const observerOptions = {
                root: null,
                rootMargin: "0px",
                threshold: 0.1,
            };
            const observer = new IntersectionObserver((entries, observer) => {
                entries.forEach((entry) => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add("visible");
                        observer.unobserve(entry.target);
                    }
                });
            }, observerOptions);

            window.onload = function () {
                resize();
                animate();
                document
                    .querySelectorAll(".fade-in-up")
                    .forEach((el) => observer.observe(el));
            };
        </script>
